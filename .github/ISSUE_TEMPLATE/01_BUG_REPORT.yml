name: "错误报告 - Bug Report"
description: "报告与 本仓库 有关的程序错误 - Report the errors that related to This Repo"

title: "[BUG] "
labels:
  - "Bug"
body:
  - type: "markdown"
    attributes:
      value: |-
        ## 请注意 - Caution
        This form only used for bug report, for any other cases, please [click here](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/issues/new)  
        此表单**仅用于反馈错误**，如果是其它类型的反馈，请[点击这里以重新选择](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/issues/new/choose)。 
        请尽可能完整且详细地填写所有表单项，以便我们以最高效率并准确的排查故障和诊断问题。
        **错误填写或者没有仔细检查末尾的检查清单，将导致此 Issue 被立刻关闭。**
        **只有最新版本的 本仓库 才会得到支持，任何非最新版本的 Issue 将被立刻关闭**
        
        [在此查看最新哈希的HASH](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/commits/master/)
  - type: "input"
    attributes:
      label: "哈希 - HASH"
      description: |-
        Enter the hash that display on Github Releases or the commit hash that can be found in commit history page.
        输入您正在使用 本仓库 的HASH，通常可在提交记录页面找到
      placeholder: "hash_value"
    validations:
      required: true
  - type: "textarea"
    attributes:
      label: "操作系统平台和系统架构 - OS  and CPU Arch"
      description: |-
        Enter the OS version/arch
        输入 所在的操作系统平台，例如：Windows、Debian 等
      placeholder: "platform_name"
    validations:
      required: true
  - type: checkboxes
    id: deploy-methods
    attributes:
      label: "部署方式 - Deploy methods"
      description: |-
        Check and tick checkboxes that deploy methods that you're using
        请检查并勾选你正在使用的 本仓库 部署方式
      options:
        - label: "手动编译"
          required: false
        - label: "Actions 自动编译"
          required: false
        - label: "Release 页面下载的预编译版本"
          required: false
  - type: "textarea"
    attributes:
      label: "问题描述 - Issue Description"
      description: |-
        Describe the problem you encounted.
        在此详细的描述你所遇到的问题
    validations:
      required: true
  - type: "textarea"
    attributes:
      label: "复现步骤 - Reproduce steps"
      description: |-
        If you know how to reproduce the error, please type it in this text area.  
        如果你清楚如何复现此故障，也欢迎告诉我们，帮助我们更快的复现它。如果它是一个偶尔才会出现的错误，请告诉我们它通常可能会在什么情况下出现。
      placeholder: |-
        1. 第一步
        2. ...
        3. 出现 BUG!
    validations:
      required: true
  - type: "textarea"
    attributes:
      label: "截图/日志文件 - Screenshot / Logs "
      description: |-
        If you have some screenshot or logs file can help us, please upload them here.  
        如果你有一些截图或者日志能够更好的解释你所提出的问题，你可以在这里上传。
      placeholder: "<截图文件>"
    validations:
      required: false
  - type: "textarea"
    attributes:
      label: "额外信息 - Addition Information"
      description: |-
        If you have any related informations, please insert them into this text area.
        如果你还有其他觉得可能对排查和解决此问题有帮助的更多信息，可以在这里告诉我们
      placeholder: "在此填写可能有用的额外信息..."
  - type: checkboxes
    id: check-list
    attributes:
      label: 检查清单 - Check list
      description: |-
        Check and tick checkboxes that listed below
        检查并勾选所有需要勾选的框框
      options:
        - label: "本仓库 已更新到最新版本，非最新版本不接受任何错误反馈，任何非最新版本的 Issue 将被 立 刻 关 闭，不会有人给您提供任何支持 (I'm running the latest version of that can be found in Github Relases, non-latest release won't receive any support)"
          required: false
        - label: "我已检查过 [README](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/blob/master/README.md) 与现有 [Issues](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/issues?q=is%3Aissue)，未找到相同问题 (I've checked [README](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/blob/master/README.md) and existing [issues](https://github.com/Yuzhii0718/bl-mt798x-dhcpd/issues?q=is%3Aissue))"
          required: false
        - label: "我没有检查这个检查清单，只是闭眼选中了所有的复选框，请关闭这个 Issue (I have not read these checkboxes and therefore I just ticked them all, Please close this issue)"
          required: false
