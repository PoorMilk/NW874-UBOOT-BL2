name: Daily Build 360T7 U-Boot

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nw874-256m

      - name: Install deps
        run: sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler

      - name: Chmod
        run: chmod +x build.sh

      - name: Build
        run: SOC=mt7981 BOARD=360t7 ./build.sh

      - name: Package
        run: |
          DATE=$(date +%Y%m%d)
          mkdir -p out
          cp output/*.bin out/
          zip -j 360t7-uboot-$DATE.zip out/*
          echo "FILE=360t7-uboot-$DATE.zip" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: 360T7 U-Boot
          tag_name: build-${{ github.run_id }}
          draft: false
          prerelease: false
          files: ${{ env.FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
