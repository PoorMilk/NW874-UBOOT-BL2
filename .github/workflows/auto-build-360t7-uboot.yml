name: 360T7
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nw874-256m
      
      - name: Build
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler
          chmod +x build.sh
          SOC=mt7981 BOARD=360t7 ./build.sh

      - name: Package
        run: |
          DATE=$(date +%Y%m%d)
          mkdir -p out
          cp output/*.bin out/
          zip -j 360t7-uboot-$DATE.zip out/*

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 360t7-uboot
          path: 360t7-uboot-*.zip
          retention-days: 7
