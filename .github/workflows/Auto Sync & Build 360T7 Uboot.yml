name: Auto Sync & Build 360T7
on:
  schedule:
    - cron: "0 0 * * 3"
  workflow_dispatch:
jobs:
  sync-and-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync upstream
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Yuzhii0718/bl-mt798x-dhcpd.git
          git fetch upstream
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          mkdir -p /tmp/backup
          cp README.md /tmp/backup/
          cp uboot-mtk-20250711/configs/mt7981_360t7_defconfig /tmp/backup/
          cp atf-20250711/plat/mediatek/mt7981/drivers/pll/pll.c /tmp/backup/
          git merge --no-edit upstream/master || true
          cp /tmp/backup/README.md .
          cp /tmp/backup/mt7981_360t7_defconfig uboot-mtk-20250711/configs/
          cp /tmp/backup/pll.c atf-20250711/plat/mediatek/mt7981/drivers/pll/
          git add .
          git commit --no-edit
          git push origin main
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -yq gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler
      - name: Build
        run: |
          set -e
          chmod +x build.sh
          SOC=mt7981 BOARD=360t7 ./build.sh
      - name: Verify build output
        run: |
          ls -lh output/
          ls output/bl2-*.img >/dev/null 2>&1 || exit 1
          ls output/fip-*.bin >/dev/null 2>&1 || exit 1
      - name: Package & Set variables
        run: |
          set -e
          DATE=$(date +%Y%m%d)
          TIME=$(date +%H%M%S)
          cd output
          mv bl2-*.img NW874-360t7-bl2.bin
          mv fip-*.bin NW874-360t7-uboot.bin
          zip ../NW874-360t7-uboot-${DATE}-${TIME}.zip NW874-360t7-bl2.bin NW874-360t7-uboot.bin
          echo "ZIP_FILE=NW874-360t7-uboot-${DATE}-${TIME}.zip" >> $GITHUB_ENV
          echo "RELEASE_TAG=${DATE}-${TIME}" >> $GITHUB_ENV
          echo "RELEASE_NAME=360T7 U-Boot ${DATE} ${TIME:0:2}:${TIME:2:2}:${TIME:4:2}" >> $GITHUB_ENV
      - name: Keep only latest 2 releases
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const sortedReleases = releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = sortedReleases.slice(2);
            for (const release of toDelete) {
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                }).catch(() => {});
              } catch(e) {}
            }
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.ZIP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
