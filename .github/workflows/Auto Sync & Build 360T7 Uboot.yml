name: Auto Sync & Build 360T7

on:
  schedule:
    - cron: "0 0 * * 3"
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Yuzhii0718/bl-mt798x-dhcpd.git
          git fetch upstream
          git checkout main
          git update-index --skip-worktree uboot-mtk-20250711/configs/mt7981_360t7_defconfig
          git update-index --skip-worktree atf-20250711/plat/mediatek/mt7981/drivers/pll/pll.c
          git merge --no-edit upstream/master
          git push origin main

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler

      - name: Build
        run: |
          chmod +x build.sh
          SOC=mt7981 BOARD=360t7 ./build.sh

      - name: Package
        run: |
          DATE=$(date +%Y%m%d-%H%M%S)
          cd output
          mv bl2-*.img NW874-360t7-bl2.bin
          mv fip-*.bin NW874-360t7-uboot.bin
          zip ../NW874-360t7-uboot-$DATE.zip NW874-360t7-bl2.bin NW874-360t7-uboot.bin
          echo "RELEASE_TAG=$DATE" >> $GITHUB_ENV
          echo "ZIP_FILE=NW874-360t7-uboot-$DATE.zip" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "360T7 U-Boot ${{ env.RELEASE_TAG }}"
          files: ${{ env.ZIP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep latest 2 releases
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100
            });
            const toDelete = releases.slice(2);
            for (const rel of toDelete) {
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` }).catch(() => {});
            }
