name: Auto Sync & Build 360T7
on:
  schedule:
    - cron: "0 0 * * 3"
  workflow_dispatch:
jobs:
  sync-and-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync upstream
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Yuzhii0718/bl-mt798x-dhcpd.git
          git fetch upstream
          git checkout main
          git reset --hard upstream/master
          git push origin main --force-with-lease
      - name: Restore custom files
        run: |
          set -e
          git checkout main
          git pull origin main
          cp README.md /tmp/README.md.bak 2>/dev/null || true
          cp uboot-mtk-*/configs/mt7981_360t7_defconfig /tmp/mt7981_360t7_defconfig.bak 2>/dev/null || true
          cp atf-*/plat/mediatek/mt7981/drivers/pll/pll.c /tmp/pll.c.bak 2>/dev/null || true
          git reset --hard upstream/master
          git pull origin main --rebase
          cp /tmp/README.md.bak README.md 2>/dev/null || true
          cp /tmp/mt7981_360t7_defconfig.bak uboot-mtk-*/configs/mt7981_360t7_defconfig 2>/dev/null || true
          cp /tmp/pll.c.bak atf-*/plat/mediatek/mt7981/drivers/pll/pll.c 2>/dev/null || true
          git add .
          git commit -m "Restore custom files: README.md, mt7981_360t7_defconfig, pll.c" || echo "No changes to commit"
          git push origin main
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -yq git wget lzop gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler
      - name: Build
        run: |
          set -e
          chmod +x build.sh
          SOC=mt7981 BOARD=360t7 ./build.sh
      - name: Verify build output
        run: |
          ls -lh output/
          ls output/bl2-*.img >/dev/null 2>&1 || exit 1
          ls output/fip-*.bin >/dev/null 2>&1 || exit 1
      - name: Package & Set variables
        run: |
          set -e
          DATE=$(date +%Y%m%d)
          TIME=$(date +%H%M%S)
          cd output
          mv bl2-*.img NW874-360t7-bl2.bin
          mv fip-*.bin NW874-360t7-uboot.bin
          zip ../NW874-360t7-uboot-${DATE}-${TIME}.zip NW874-360t7-bl2.bin NW874-360t7-uboot.bin
          echo "ZIP_FILE=NW874-360t7-uboot-${DATE}-${TIME}.zip" >> $GITHUB_ENV
          echo "RELEASE_TAG=${DATE}-${TIME}" >> $GITHUB_ENV
          echo "RELEASE_NAME=360T7 U-Boot ${DATE} ${TIME:0:2}:${TIME:2:2}:${TIME:4:2}" >> $GITHUB_ENV
      - name: Keep only latest 2 releases
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
              if (releases.length <= 2) {
                console.log(`Only ${releases.length} releases, nothing to delete`);
                return;
              }
              const sortedReleases = releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const toDelete = sortedReleases.slice(2);
              for (const release of toDelete) {
                try {
                  await github.rest.repos.deleteRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: release.id
                  });
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${release.tag_name}`
                  }).catch(() => {});
                  console.log(`Deleted release ${release.name || release.tag_name}`);
                } catch(e) {
                  console.log(`Failed to delete ${release.tag_name}: ${e.message}`);
                }
              }
            } catch(e) {
              console.log(`Error: ${e.message}`);
            }
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.ZIP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
